function M(y=S.year,m=S.month){
  const k=mkey(y,m), first=k+"-01";
  if(!S.months[k]) S.months[k]={budget:0,tx:[],bills:DEFAULT_BILLS.map(n=>({id:uid(),name:n,due:first,paid:false,paidDate:null}))};
  for(const b of S.months[k].bills) if(!b.due) b.due=first;
  return S.months[k];
}
function uid(){ return Math.random().toString(36).slice(2,10); }
function fmt(n){ return "PKR "+Math.round(n).toLocaleString("en-PK"); }
function fmtN(n){ return Math.round(n).toLocaleString("en-PK"); }
let page="home", txFilter={q:"",type:"All",cat:"All"};

/* ---------- derived ---------- */
function sums(y=S.year,m=S.month){
  const d=M(y,m); let inc=0,exp=0,bin=0,bex=0; const byCat={};
  for(const t of d.tx){
    if(t.type==="income") inc+=t.amount;
    else if(t.type==="expense"){ exp+=t.amount; byCat[t.cat]=(byCat[t.cat]||0)+t.amount; }
    else if(t.type==="biz-income") bin+=t.amount;
    else if(t.type==="biz-expense") bex+=t.amount;
  }
  return {inc,exp,bin,bex,profit:bin-bex,byCat};
}
function savingsBal(acc){ return S.savings[acc].tx.reduce((a,t)=>a+(t.kind==="deposit"?t.amount:-t.amount),0); }
/* Each month is its own workspace, so the balance is that month's net only. */
function totalBalance(y=S.year,m=S.month){
  if(!S.months[mkey(y,m)]) return 0;
  const s=sums(y,m); return s.inc-s.exp+s.bin-s.bex;
}
function savingsMonth(y=S.year,m=S.month){
  const k=mkey(y,m);
  return ["A","B"].reduce((a,acc)=>a+S.savings[acc].tx.filter(t=>t.month===k).reduce((x,t)=>x+(t.kind==="deposit"?t.amount:-t.amount),0),0);
}
function prevYM(y,m){ return m===0?[y-1,11]:[y,m-1]; }

/* ---------- shell ---------- */
const PAGES=[["home","Home","🏠"],["tx","Transactions","🧾"],["savings","Savings","🏦"],["biz","Business","📈"],["bills","Bills","📅"],["settings","Settings","⚙️"]];
function renderNav(){
  document.getElementById("deskNav").innerHTML=PAGES.map(p=>`<button class="${page===p[0]?'on':''}" onclick="go('${p[0]}')">${p[1]}</button>`).join("");
  document.getElementById("mobNav").innerHTML=PAGES.map(p=>`<button class="${page===p[0]?'on':''}" onclick="go('${p[0]}')"><span class="ic">${p[2]}</span>${p[1]}</button>`).join("");
}
function renderPeriod(){
  const now=new Date(), cy=now.getFullYear();
  const yrs=[...new Set([cy-1,cy,cy+1,S.year,...Object.keys(S.months).map(k=>+k.split("-")[0])])].sort((a,b)=>a-b);
  document.getElementById("years").innerHTML=yrs.map(y=>`<button class="${S.year===y?'on':''}" onclick="setYear(${y})">${y}</button>`).join("");
  document.getElementById("monthsBar").innerHTML=MONTHS.map((m,i)=>`<button class="${S.month===i?'on':''}" onclick="setMonth(${i})">${m.slice(0,3)}</button>`).join("");
  const atNow=S.year===cy&&S.month===now.getMonth();
  document.getElementById("todayBtn").className="today"+(atNow?" hide":"");
}
function goToday(){
  const n=new Date(); S.year=n.getFullYear(); S.month=n.getMonth(); save(); render();
  window.scrollTo({top:0,behavior:"smooth"}); toast(MONTHS[S.month]+" "+S.year);
}
function setYear(y){ S.year=y; save(); render(); window.scrollTo({top:0,behavior:"smooth"}); }
function setMonth(m){ S.month=m; save(); render(); window.scrollTo({top:0,behavior:"smooth"}); }
function go(p){ page=p; render(); window.scrollTo({top:0}); }
function render(){
  renderNav(); renderPeriod();
  const v=document.getElementById("view");
  v.innerHTML = page==="home"?homeView():page==="tx"?txView():page==="savings"?savingsView():page==="biz"?bizView():page==="bills"?billsView():settingsView();
  const sel=document.querySelector(".months button.on"); if(sel) sel.scrollIntoView({inline:"center",block:"nearest"});
}

/* ---------- HOME ---------- */
function greet(){ const h=new Date().getHours(); return h<12?"Good Morning":h<17?"Good Afternoon":"Good Evening"; }
function homeView(){
  const s=sums(), d=M();
  const bal=totalBalance();
  const [py,pm]=prevYM(S.year,S.month);
  const pbal=totalBalance(py,pm);
  const dpc=pbal!==0?((bal-pbal)/Math.abs(pbal)*100):0;
  const budget=d.budget||0, spent=s.exp, remain=budget-spent;
  const now=new Date(); const dim=new Date(S.year,S.month+1,0).getDate();
  const isCur=now.getFullYear()===S.year&&now.getMonth()===S.month;
  const daysLeft=isCur?dim-now.getDate()+1:(new Date(S.year,S.month,1)>now?dim:0);
  const daily=daysLeft>0&&remain>0?remain/daysLeft:0;
  const dayPassed=isCur?now.getDate():dim;
  const proj=dayPassed>0?spent/dayPassed*dim:spent;
  const pct=budget>0?Math.min(spent/budget*100,100):0;
  const status=budget<=0?["Set a budget","p-blue"]:spent>budget?["Over Budget","p-bad"]:proj>budget?["At Risk","p-warn"]:["On Track","p-ok"];
  const recent=[...d.tx].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5);
  return `
  <div class="hello">
    <h1>Hi, ${esc(S.name)} 👋</h1>
    <p>${greet()} — Welcome Back, Here's Your Financial Overview</p>
  </div>
  <div class="balcard">
    <div class="lbl">Total Balance · ${MONTHS[S.month]} ${S.year}</div>
    <div class="bal money"><small>PKR</small> ${fmtN(bal)}</div>
    <div class="delta">${dpc>=0?"↑":"↓"} ${Math.abs(dpc).toFixed(1)}% vs Last Month</div>
  </div>
  <div class="qa">
    <button onclick="openTx('income')"><span class="b inc">+</span>Income</button>
    <button onclick="openTx('expense')"><span class="b exp">−</span>Spend</button>
    <button onclick="go('tx')"><span class="b txn">☰</span>Transactions</button>
  </div>

  <div class="grid g2">
    <div class="card">
      <h3>Monthly Budget <span class="pill ${status[1]}">${status[0]}</span></h3>
      <div class="editbud"><input id="budIn" type="number" inputmode="numeric" placeholder="Budget (PKR)" value="${budget||""}"><button class="btn sm" onclick="setBudget()">Save</button></div>
      <div class="bar"><i style="width:${pct}%;${spent>budget&&budget>0?'background:linear-gradient(90deg,#EF4444,#F97316)':''}"></i></div>
      <div class="brow"><span>Spent</span><b class="money">${fmt(spent)}</b></div>
      <div class="brow"><span>Remaining</span><b class="money" style="color:${remain<0?'var(--bad)':'var(--ok)'}">${fmt(remain)}</b></div>
      <div class="brow"><span>Days Left</span><b>${daysLeft}</b></div>
      <div class="brow"><span>Safe Daily Spending</span><b class="money">${fmt(daily)}</b></div>
      <div class="brow"><span>Projected End of Month</span><b class="money" style="color:${budget>0&&proj>budget?'var(--warn)':'var(--t1)'}">${fmt(proj)}</b></div>
    </div>
    <div class="card">
      <h3>Quick Overview</h3>
      <div class="grid g4" style="margin-top:4px">
        ${tile("Income",s.inc,"↓","rgba(52,199,89,.16)","var(--ok)")}
        ${tile("Expenses",s.exp,"↑","rgba(255,59,48,.14)","var(--bad)")}
        ${tile("Savings",savingsMonth(),"🏦","rgba(0,122,255,.14)","var(--blue)")}
        ${tile("Biz Profit",s.profit,"📈","rgba(255,149,0,.16)","var(--warn)")}
      </div>
    </div>
  </div>

  <div class="grid g2">
    <div class="card">
      <h3>Recent Transactions <button class="tiny" style="color:var(--blue);font-weight:500" onclick="go('tx')">View all →</button></h3>
      ${recent.length?recent.map(txRow).join(""):`<div class="empty">No transactions yet this month.<br>Use + Income or − Spend to add one.</div>`}
    </div>
    <div class="card">
      <h3>Category Breakdown</h3>
      ${donut(s.byCat,s.exp)}
    </div>
  </div>

  <div class="grid g2">
    <div class="card">
      <h3>Business Snapshot <button class="tiny" style="color:var(--blue);font-weight:500" onclick="go('biz')">Open →</button></h3>
      <div class="rrow"><span>Business Income</span><b class="money">${fmt(s.bin)}</b></div>
      <div class="rrow"><span>Business Expenses</span><b class="money">${fmt(s.bex)}</b></div>
      <div class="rrow"><span>Business Profit</span><b class="money" style="color:${s.profit>=0?'var(--ok)':'var(--bad)'}">${fmt(s.profit)}</b></div>
    </div>
    <div class="card">
      <h3>Financial Insights</h3>
      ${insights().map(i=>`<div class="insight"><span class="e">${i[0]}</span><span>${i[1]}</span></div>`).join("")||`<div class="empty">Insights appear once you log data.</div>`}
    </div>
  </div>

  <div class="card" style="margin-top:16px">
    <h3>Monthly Report — ${MONTHS[S.month]} ${S.year}</h3>
    ${report()}
  </div>`;
}
function tile(lbl,v,ic,bg,c){ return `<div class="card stat" style="padding:14px;animation:none"><div class="ic" style="background:${bg};color:${c}">${ic}</div><div class="tiny">${lbl}</div><div class="v money">${fmt(v)}</div></div>`; }
function catMeta(t){ return t.type==="income"?(INC_CATS[t.cat]||["✨",GREY]):t.type.startsWith("biz")?(BIZ_CATS[t.cat]||["📈","#007AFF"]):(EXP_CATS[t.cat]||["📦",GREY]); }
function txRow(t){
  const [e,c]=catMeta(t); const inn=t.type==="income"||t.type==="biz-income";
  return `<div class="tx"><div class="ic" style="background:${c}22;color:${c}">${e}</div>
  <div class="mid"><div class="nm">${esc(t.name||t.cat)}</div><div class="sub">${t.cat} · ${niceDate(t.date)}${t.notes?" · "+esc(t.notes):""}</div></div>
  <div class="amt money ${inn?'in':'out'}">${inn?"+ ":"− "}${fmtN(t.amount)}</div>
  <button class="del" onclick="delTx('${t.id}')" title="Delete">✕</button></div>`;
}
function niceDate(d){ const x=new Date(d+"T00:00"); return isNaN(x)?d:x.toLocaleDateString("en-GB",{day:"numeric",month:"short"}); }
function donut(byCat,total){
  const entries=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  if(!total) return `<div class="empty">No spending yet — your category chart will appear here.</div>`;
  const R=52,CIRC=2*Math.PI*R; let off=0, segs="";
  for(const [cat,v] of entries){
    const frac=v/total, c=(EXP_CATS[cat]||["",GREY])[1];
    segs+=`<circle class="seg" cx="70" cy="70" r="${R}" fill="none" stroke="${c}" stroke-width="16" stroke-dasharray="${(frac*CIRC-1.5).toFixed(1)} ${CIRC}" stroke-dashoffset="${(-off*CIRC).toFixed(1)}" transform="rotate(-90 70 70)"/>`;
    off+=frac;
  }
  return `<div class="donutwrap">
    <svg width="140" height="140" viewBox="0 0 140 140">${segs}
      <text x="70" y="66" text-anchor="middle" fill="var(--t3)" font-size="9" font-weight="500">TOTAL</text>
      <text x="70" y="82" text-anchor="middle" fill="var(--t1)" font-size="13" font-weight="600" class="money">${fmtN(total)}</text></svg>
    <div class="legend">${entries.map(([cat,v])=>`<div class="leg"><span class="sw" style="background:${(EXP_CATS[cat]||["",GREY])[1]}"></span><span class="n">${cat}</span><span class="pc">${Math.round(v/total*100)}%</span><b class="money">&nbsp;${fmtN(v)}</b></div>`).join("")}</div>
  </div>`;
}
function insights(){
  const s=sums(); const [py,pm]=prevYM(S.year,S.month); const p=sums(py,pm); const out=[];
  if(p.exp>0){ const d=(s.exp-p.exp)/p.exp*100;
    out.push(d<=0?["✅",`You spent ${Math.abs(d).toFixed(0)}% less than last month.`]:["📈",`Spending is up ${d.toFixed(0)}% vs last month.`]); }
  for(const cat of ["Shopping","Fuel","Eat Out"]){
    const a=s.byCat[cat]||0,b=p.byCat[cat]||0;
    if(b>0&&Math.abs(a-b)/b>0.1) out.push([a>b?"🛍️":"👍",`${cat} ${a>b?"increased":"decreased"} by ${Math.abs((a-b)/b*100).toFixed(0)}%.`]);
  }
  const bud=M().budget;
  if(bud>0) out.push(s.exp<=bud?["🎯","You're under budget this month."]:["⚠️",`You're ${fmt(s.exp-bud)} over budget.`]);
  if(p.bex>0&&s.bex<p.bex) out.push(["💼","Business expenses were lower than last month."]);
  const top=Object.entries(s.byCat).sort((a,b)=>b[1]-a[1])[0];
  if(top) out.push(["🥇",`Highest spending category: ${top[0]} (${fmt(top[1])}).`]);
  return out.slice(0,5);
}
function report(){
  const s=sums(); const d=M();
  const [py,pm]=prevYM(S.year,S.month); const p=sums(py,pm);
  const mk=mkey(S.year,S.month);
  const savAdd=["A","B"].reduce((a,acc)=>a+S.savings[acc].tx.filter(t=>t.month===mk&&t.kind==="deposit").reduce((x,t)=>x+t.amount,0),0);
  const largest=[...d.tx].filter(t=>t.type==="expense").sort((a,b)=>b.amount-a.amount)[0];
  const top=Object.entries(s.byCat).sort((a,b)=>b[1]-a[1])[0];
  const bud=d.budget||0;
  return `
  <div class="rrow"><span>Income</span><b class="money">${fmt(s.inc)}</b></div>
  <div class="rrow"><span>Personal Expenses</span><b class="money">${fmt(s.exp)}</b></div>
  <div class="rrow"><span>Business Expenses</span><b class="money">${fmt(s.bex)}</b></div>
  <div class="rrow"><span>Business Profit</span><b class="money">${fmt(s.profit)}</b></div>
  <div class="rrow"><span>Savings Added</span><b class="money">${fmt(savAdd)}</b></div>
  <div class="rrow"><span>Budget / Spent / Remaining</span><b class="money">${fmtN(bud)} / ${fmtN(s.exp)} / ${fmtN(bud-s.exp)}</b></div>
  <div class="rrow"><span>Largest Expense</span><b>${largest?esc(largest.name||largest.cat)+" — "+fmtN(largest.amount):"—"}</b></div>
  <div class="rrow"><span>Highest Spending Category</span><b>${top?top[0]:"—"}</b></div>
  <div class="rrow"><span>Budget Status</span><b>${bud<=0?"No budget set":s.exp>bud?"Over Budget":"Under Budget"}</b></div>
  <div class="rrow"><span>vs Last Month (spend)</span><b class="money">${p.exp?((s.exp-p.exp)>=0?"+":"−")+fmtN(Math.abs(s.exp-p.exp)):"—"}</b></div>`;
}
function setBudget(){ const v=+document.getElementById("budIn").value||0; M().budget=v; save(); render(); toast("Budget saved"); }

/* ---------- TRANSACTIONS ---------- */
function txView(){
  const d=M();
  let list=[...d.tx].filter(t=>!t.type.startsWith("biz")).sort((a,b)=>b.date.localeCompare(a.date));
  if(txFilter.type==="Income") list=list.filter(t=>t.type==="income");
  if(txFilter.type==="Expenses") list=list.filter(t=>t.type==="expense");
  if(txFilter.cat!=="All") list=list.filter(t=>t.cat===txFilter.cat);
  if(txFilter.q) list=list.filter(t=>((t.name||"")+" "+t.cat+" "+(t.notes||"")).toLowerCase().includes(txFilter.q.toLowerCase()));
  const cats=["All",...Object.keys(EXP_CATS),...Object.keys(INC_CATS)];
  return `
  <div class="sec"><div class="h">Transactions</div><div class="s">${MONTHS[S.month]} ${S.year} · ${list.length} shown</div></div>
  <input placeholder="Search transactions…" value="${esc(txFilter.q)}" oninput="txFilter.q=this.value;render();this.focus();this.setSelectionRange(this.value.length,this.value.length)">
  <div class="filters">
    ${["All","Income","Expenses"].map(t=>`<button class="chip ${txFilter.type===t?'on':''}" onclick="txFilter.type='${t}';render()">${t}</button>`).join("")}
    <select style="width:auto;padding:7px 12px;border-radius:999px;font-size:12.5px" onchange="txFilter.cat=this.value;render()">
      ${cats.map(c=>`<option ${txFilter.cat===c?"selected":""}>${c}</option>`).join("")}
    </select>
  </div>
  <div class="card">${list.length?list.map(txRow).join(""):`<div class="empty">Nothing matches. Try clearing the filters.</div>`}</div>
  <div class="row2" style="margin-top:16px">
    <button class="btn" onclick="openTx('income')">+ Income</button>
    <button class="btn ghost" onclick="openTx('expense')">− Spend</button>
  </div>`;
}
function delTx(id){ const d=M(); d.tx=d.tx.filter(t=>t.id!==id); save(); render(); toast("Deleted"); }

/* ---------- modal: add income / expense / biz ---------- */
let mCat=null;
function openTx(kind){
  const isInc=kind==="income", isBiz=kind.startsWith("biz");
  const cats=kind==="biz-income"?BIZ_INC_CATS:kind==="biz-expense"?BIZ_EXP_CATS:isInc?INC_CATS:EXP_CATS;
  mCat=Object.keys(cats)[0];
  const today=defDate();
  showModal(`
    <h2>${isBiz?(kind==="biz-income"?"Business Income":"Business Expense"):isInc?"Add Income":"Add Expense"}<button class="x" onclick="closeModal()">✕</button></h2>
    <div class="f"><label>Amount (PKR)</label><input id="mAmt" type="number" inputmode="decimal" placeholder="0" autofocus></div>
    <div class="f"><label>Category</label><div class="catgrid" id="mCats">${Object.entries(cats).map(([c,[e]])=>`<button class="${c===mCat?'on':''}" onclick="pickCat(this,'${c}')"><span class="e">${e}</span>${c}</button>`).join("")}</div></div>
    <div class="f"><label>Transaction Name</label><input id="mName" placeholder="Add here"></div>
    <div class="f"><label>Notes (optional)</label><input id="mNotes" placeholder="Add here"></div>
    <div class="f"><label>Date</label><input id="mDate" type="date" value="${today}"></div>
    <button class="btn" style="width:100%" onclick="saveTx('${kind}')">Save</button>`);
}
function defDate(){
  const n=new Date();
  if(n.getFullYear()===S.year&&n.getMonth()===S.month) return n.toISOString().slice(0,10);
  return mkey(S.year,S.month)+"-01";
}
function pickCat(el,c){ mCat=c; el.parentElement.querySelectorAll("button").forEach(b=>b.classList.remove("on")); el.classList.add("on"); }
function saveTx(kind){
  const amt=+document.getElementById("mAmt").value;
  if(!amt||amt<=0){ toast("Enter an amount"); return; }
  M().tx.push({id:uid(),type:kind,amount:amt,cat:mCat,name:document.getElementById("mName").value.trim(),notes:document.getElementById("mNotes").value.trim(),date:document.getElementById("mDate").value||defDate()});
  save(); closeModal(); render(); toast("Saved ✓");
}

/* ---------- SAVINGS ---------- */
function savingsView(){
  const mk=mkey(S.year,S.month);
  return `<div class="sec"><div class="h">Savings</div><div class="s">Balances carry across months. History below shows ${MONTHS[S.month]} ${S.year}.</div></div>
  <div class="grid g2">${["A","B"].map(acc=>{
    const a=S.savings[acc]; const hist=a.tx.filter(t=>t.month===mk).sort((x,y)=>y.date.localeCompare(x.date));
    return `<div class="card">
    <h3>${esc(a.name)}</h3>
    <div class="lbl">Current Balance</div>
    <div style="font-size:27px;font-weight:800;margin:6px 0 14px" class="money">${fmt(savingsBal(acc))}</div>
    <div class="row2">
      <button class="btn sm okk" onclick="openSav('${acc}','deposit')">↑ Deposit</button>
      <button class="btn sm danger" onclick="openSav('${acc}','withdraw')">↓ Withdraw</button>
    </div>
    <div style="margin-top:16px">${hist.length?hist.map(t=>`<div class="tx"><div class="ic" style="background:${t.kind==="deposit"?"rgba(52,199,89,.16)":"rgba(255,59,48,.14)"};color:${t.kind==="deposit"?"var(--ok)":"var(--bad)"}">${t.kind==="deposit"?"↑":"↓"}</div><div class="mid"><div class="nm">${t.kind==="deposit"?"Deposit":"Withdraw"}</div><div class="sub">${niceDate(t.date)}${t.notes?" · "+esc(t.notes):""}</div></div><div class="amt money ${t.kind==="deposit"?"in":"out"}">${t.kind==="deposit"?"+ ":"− "}${fmtN(t.amount)}</div><button class="del" onclick="delSav('${acc}','${t.id}')">✕</button></div>`).join(""):`<div class="empty">No activity this month.</div>`}</div>
    </div>`;}).join("")}</div>`;
}
function openSav(acc,kind){
  showModal(`<h2>${kind==="deposit"?"Deposit to":"Withdraw from"} ${esc(S.savings[acc].name)}<button class="x" onclick="closeModal()">✕</button></h2>
  <div class="f"><label>Amount (PKR)</label><input id="mAmt" type="number" inputmode="decimal" placeholder="0" autofocus></div>
  <div class="f"><label>Notes (optional)</label><input id="mNotes"></div>
  <div class="f"><label>Date</label><input id="mDate" type="date" value="${defDate()}"></div>
  <button class="btn" style="width:100%" onclick="saveSav('${acc}','${kind}')">Save</button>`);
}
function saveSav(acc,kind){
  const amt=+document.getElementById("mAmt").value; if(!amt||amt<=0){ toast("Enter an amount"); return; }
  S.savings[acc].tx.push({id:uid(),kind,amount:amt,notes:document.getElementById("mNotes").value.trim(),date:document.getElementById("mDate").value||defDate(),month:mkey(S.year,S.month)});
  save(); closeModal(); render(); toast("Saved ✓");
}
function delSav(acc,id){ S.savings[acc].tx=S.savings[acc].tx.filter(t=>t.id!==id); save(); render(); }

/* ---------- BUSINESS ---------- */

  const list=[...d.tx].filter(t=>t.type.startsWith("biz")).sort((a,b)=>b.date.localeCompare(a.date));
  return `<div class="sec"><div class="h">Business</div><div class="s">Fully separate from personal finances — business expenses never touch your personal budget.</div></div>
  <div class="grid g4" style="grid-template-columns:repeat(3,1fr)">
    ${tile("Biz Income",s.bin,"↓","rgba(52,199,89,.16)","var(--ok)")}

    ${tile("Biz Profit",s.profit,"📈","rgba(0,122,255,.14)","var(--blue)")}
  </div>
  <div class="row2" style="margin:16px 0">
    <button class="btn" onclick="openTx('biz-income')">+ Business Income</button>

  </div>
  <div class="card">${list.length?list.map(txRow).join(""):`<div class="empty">No business activity in ${MONTHS[S.month]}.</div>`}</div>`;
}

function togBill(id){ const b=M().bills.find(x=>x.id===id); b.paid=!b.paid; b.paidDate=b.paid?new Date().toISOString().slice(0,10):null; save(); render(); }
function setBillDue(id,v){ M().bills.find(x=>x.id===id).due=v; save(); render(); }
function togSub(id){ const s=S.subs.find(x=>x.id===id); s.active=!s.active; save(); render(); }
function togSubChk(id){ const s=S.subs.find(x=>x.id===id); s.checked=!s.checked; save(); render(); }
function delSub(id){ S.subs=S.subs.filter(x=>x.id!==id); save(); render(); }
function openSub(){

/* ---------- SETTINGS + EXPORT ---------- */
function settingsView(){

  <div class="card"><h3>Profile</h3>
    <div class="f"><label>Your Name</label><div class="editbud"><input id="nmIn" value="${esc(S.name)}"><button class="btn sm" onclick="S.name=document.getElementById('nmIn').value.trim()||'there';save();render();toast('Saved')">Save</button></div></div>
  </div>
  <div class="card" style="margin-top:16px"><h3>Excel Export</h3>
    <p class="muted" style="margin-bottom:12px">Downloads an .xlsx workbook with ten sheets: Dashboard Summary (per-month figures plus totals), Transactions, Income, Personal Expenses, Business Income, Business Expenses, Savings, Bills, Subscriptions and Categories.</p>
    <div class="row2">

    <div class="row2">

function backup(){ dl(new Blob([JSON.stringify(S,null,1)],{type:"application/json"}),"finance-tracker-backup.json"); toast("Backup downloaded"); }
function restore(inp){
  const f=inp.files[0]; if(!f) return;
  f.text().then(t=>{ const d=JSON.parse(t); if(!d.months) throw 0; S=d; save(); render(); toast("Backup restored ✓"); }).catch(()=>toast("That file isn't a valid backup"));
}
function wipe(){ if(confirm("Erase ALL data on this device? This cannot be undone.")){ localStorage.removeItem(LS); S=load(); render(); toast("All data erased"); } }

function monthKeysForRange(mode){
  const keys=[];
  if(mode==="year"){ for(let m=0;m<12;m++) keys.push(mkey(S.year,m)); return keys; }
  if(typeof mode==="number"){ let y=S.year,m=S.month; for(let i=0;i<mode;i++){ keys.unshift(mkey(y,m)); [y,m]=prevYM(y,m); } return keys; }
  return null;
}
/* ---------- XLSX writer ----------
   Writes a real .xlsx (zipped OOXML) so Excel, Numbers and Google Sheets all open it.
   Entries are stored uncompressed, which is valid and keeps this dependency-free. */
function crc32(bytes){
  let t=crc32.t;
  if(!t){ t=crc32.t=new Uint32Array(256);
    for(let n=0;n<256;n++){ let c=n; for(let k=0;k<8;k++) c=(c&1)?(0xEDB88320^(c>>>1)):(c>>>1); t[n]=c>>>0; } }
  let crc=0xFFFFFFFF;
  for(let i=0;i<bytes.length;i++) crc=(crc>>>8)^t[(crc^bytes[i])&0xFF];
  return (crc^0xFFFFFFFF)>>>0;
}
function zipFiles(files){
  const enc=new TextEncoder(), local=[], central=[]; let off=0;
  for(const f of files){
    const nm=enc.encode(f.name), crc=crc32(f.data), sz=f.data.length;
    const lh=new Uint8Array(30+nm.length), lv=new DataView(lh.buffer);
    lv.setUint32(0,0x04034b50,true); lv.setUint16(4,20,true); lv.setUint16(8,0,true);
    lv.setUint32(14,crc,true); lv.setUint32(18,sz,true); lv.setUint32(22,sz,true);
    lv.setUint16(26,nm.length,true); lh.set(nm,30);
    local.push(lh,f.data);
    const ch=new Uint8Array(46+nm.length), cv=new DataView(ch.buffer);
    cv.setUint32(0,0x02014b50,true); cv.setUint16(4,20,true); cv.setUint16(6,20,true); cv.setUint16(10,0,true);
    cv.setUint32(16,crc,true); cv.setUint32(20,sz,true); cv.setUint32(24,sz,true);
    cv.setUint16(28,nm.length,true); cv.setUint32(42,off,true); ch.set(nm,46);
    central.push(ch);
    off+=lh.length+sz;
  }
  const cdSize=central.reduce((a,b)=>a+b.length,0);
  const end=new Uint8Array(22), ev=new DataView(end.buffer);
  ev.setUint32(0,0x06054b50,true); ev.setUint16(8,central.length,true); ev.setUint16(10,central.length,true);
  ev.setUint32(12,cdSize,true); ev.setUint32(16,off,true);
  return new Blob([...local,...central,end],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"});
}
function colName(n){ let s=""; while(n>0){ const m=(n-1)%26; s=String.fromCharCode(65+m)+s; n=(n-m-1)/26; } return s; }
function sheetXml(rows){
  const body=rows.map((r,ri)=>{
    const cells=r.map((c,ci)=>{
      const ref=colName(ci+1)+(ri+1);
      if(typeof c==="number"&&isFinite(c)) return '<c r="'+ref+'" s="2"><v>'+c+'</v></c>';
      return '<c r="'+ref+'" s="'+(ri===0?1:0)+'" t="inlineStr"><is><t xml:space="preserve">'+xesc(c==null?"":String(c))+'</t></is></c>';
    }).join("");
    return '<row r="'+(ri+1)+'">'+cells+'</row>';
  }).join("");
  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><worksheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main"><sheetData>'+body+'</sheetData></worksheet>';
}
function buildXlsx(sheets){
  const enc=new TextEncoder(), files=[], add=(n,s)=>files.push({name:n,data:enc.encode(s)});
  const R="http://schemas.openxmlformats.org/officeDocument/2006/relationships";
  add("[Content_Types].xml",
    '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types">'+
    '<Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/>'+
    '<Override PartName="/xl/workbook.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.sheet.main+xml"/>'+
    '<Override PartName="/xl/styles.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.styles+xml"/>'+
    sheets.map((s,i)=>'<Override PartName="/xl/worksheets/sheet'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.spreadsheetml.worksheet+xml"/>').join("")+'</Types>');
  add("_rels/.rels",'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="'+R+'/officeDocument" Target="xl/workbook.xml"/></Relationships>');
  add("xl/workbook.xml",'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><workbook xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main" xmlns:r="'+R+'"><sheets>'+
    sheets.map((s,i)=>'<sheet name="'+xesc(s[0])+'" sheetId="'+(i+1)+'" r:id="rId'+(i+1)+'"/>').join("")+'</sheets></workbook>');
  add("xl/_rels/workbook.xml.rels",'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+
    sheets.map((s,i)=>'<Relationship Id="rId'+(i+1)+'" Type="'+R+'/worksheet" Target="worksheets/sheet'+(i+1)+'.xml"/>').join("")+
    '<Relationship Id="rId'+(sheets.length+1)+'" Type="'+R+'/styles" Target="styles.xml"/></Relationships>');
  add("xl/styles.xml",'<?xml version="1.0" encoding="UTF-8" standalone="yes"?><styleSheet xmlns="http://schemas.openxmlformats.org/spreadsheetml/2006/main">'+
    '<fonts count="2"><font><sz val="11"/><name val="Calibri"/></font><font><b/><sz val="11"/><color rgb="FFFFFFFF"/><name val="Calibri"/></font></fonts>'+
    '<fills count="3"><fill><patternFill patternType="none"/></fill><fill><patternFill patternType="gray125"/></fill>'+
    '<fill><patternFill patternType="solid"><fgColor rgb="FF007AFF"/><bgColor indexed="64"/></patternFill></fill></fills>'+
    '<borders count="1"><border/></borders><cellStyleXfs count="1"><xf numFmtId="0" fontId="0" fillId="0" borderId="0"/></cellStyleXfs>'+
    '<cellXfs count="3"><xf numFmtId="0" fontId="0" fillId="0" borderId="0" xfId="0"/>'+
    '<xf numFmtId="0" fontId="1" fillId="2" borderId="0" xfId="0" applyFont="1" applyFill="1"/>'+
    '<xf numFmtId="3" fontId="0" fillId="0" borderId="0" xfId="0" applyNumberFormat="1"/></cellXfs>'+
    '<cellStyles count="1"><cellStyle name="Normal" xfId="0" builtinId="0"/></cellStyles></styleSheet>');
  sheets.forEach((s,i)=>add("xl/worksheets/sheet"+(i+1)+".xml",sheetXml(s[1])));
  return zipFiles(files);
}
/* Month totals limited to a date range, so a custom range's summary matches its transactions. */
function statsIn(d,inRange){
  let inc=0,exp=0,bin=0,bex=0; const byCat={};
  for(const t of d.tx){
    if(!inRange(t)) continue;
    if(t.type==="income") inc+=t.amount;
    else if(t.type==="expense"){ exp+=t.amount; byCat[t.cat]=(byCat[t.cat]||0)+t.amount; }
    else if(t.type==="biz-income") bin+=t.amount;
    else if(t.type==="biz-expense") bex+=t.amount;
  }
  return {inc,exp,bin,bex,profit:bin-bex,byCat};
}
function exportXls(mode){
  let from=null,to=null,keys=monthKeysForRange(mode);
  if(mode==="custom"){
    from=document.getElementById("exFrom").value; to=document.getElementById("exTo").value;
    if(!from||!to){ toast("Pick both dates"); return; }
    if(from>to){ const t=from; from=to; to=t; }
    keys=[]; let d=new Date(from+"T00:00"); const end=new Date(to+"T00:00");
    while(d<=end){ const k=mkey(d.getFullYear(),d.getMonth()); if(!keys.includes(k)) keys.push(k); d.setDate(1); d.setMonth(d.getMonth()+1); }
  }
  const inRange=t=>!from||(t.date>=from&&t.date<=to);
  const savIn=t=>keys.includes(t.month)&&(!from||(t.date>=from&&t.date<=to));
  const rows={sum:[["Month","Income","Personal Expenses","Business Income","Business Expenses","Business Profit","Savings Added","Budget","Spent","Remaining","Status"]],
    tx:[["Date","Month","Type","Category","Name","Amount (PKR)","Notes"]],
    inc:[["Date","Category","Name","Amount (PKR)","Notes"]],
    exp:[["Date","Category","Name","Amount (PKR)","Notes"]],
    bizIn:[["Date","Category","Name","Amount (PKR)","Notes"]],
    bizEx:[["Date","Category","Name","Amount (PKR)","Notes"]],
    sav:[["Date","Account","Type","Amount (PKR)","Notes"]],
    bills:[["Month","Bill","Due Date","Paid","Paid Date"]],
    subs:[["Name","Amount (PKR)","Renewal","Active","Free Trial","Trial Start","Trial End"]],
    cats:[["Month","Category","Amount (PKR)"]]};
  const T={inc:0,exp:0,bin:0,bex:0,sav:0,bud:0,months:0};
  const TYPE={income:"Income",expense:"Personal Expense","biz-income":"Business Income","biz-expense":"Business Expense"};
  for(const k of keys){
    if(!S.months[k]) continue;
    const [y,m]=k.split("-").map(Number), d=S.months[k], mn=MONTHS[m-1]+" "+y;
    const s=statsIn(d,inRange);
    const savAdd=["A","B"].reduce((a,acc)=>a+S.savings[acc].tx.filter(t=>t.month===k&&savIn(t)).reduce((x,t)=>x+(t.kind==="deposit"?t.amount:-t.amount),0),0);
    const bud=d.budget||0;
    rows.sum.push([mn,s.inc,s.exp,s.bin,s.bex,s.profit,savAdd,bud,s.exp,bud-s.exp,bud<=0?"No budget set":s.exp>bud?"Over Budget":"Under Budget"]);
    T.inc+=s.inc; T.exp+=s.exp; T.bin+=s.bin; T.bex+=s.bex; T.sav+=savAdd; T.bud+=bud; T.months++;
    for(const t of [...d.tx].sort((a,b)=>a.date.localeCompare(b.date))){
      if(!inRange(t)) continue;
      rows.tx.push([t.date,mn,TYPE[t.type]||t.type,t.cat,t.name||"",t.amount,t.notes||""]);
      const row=[t.date,t.cat,t.name||"",t.amount,t.notes||""];
      if(t.type==="income") rows.inc.push(row);
      if(t.type==="expense") rows.exp.push(row);
      if(t.type==="biz-income") rows.bizIn.push(row);
      if(t.type==="biz-expense") rows.bizEx.push(row);
    }
    for(const c in s.byCat) rows.cats.push([mn,c,s.byCat[c]]);
    for(const b of d.bills) rows.bills.push([mn,b.name,b.due||"",b.paid?"Yes":"No",b.paidDate||""]);
  }
  if(rows.sum.length===1){ toast("No data in that range"); return; }
  rows.sum.push([]);
  rows.sum.push(["TOTAL",T.inc,T.exp,T.bin,T.bex,T.bin-T.bex,T.sav,T.bud,T.exp,T.bud-T.exp,T.exp>T.bud&&T.bud>0?"Over Budget":"Under Budget"]);
  rows.sum.push([]);
  rows.sum.push(["Net Personal (Income − Expenses)",T.inc-T.exp]);
  rows.sum.push(["Business Profit",T.bin-T.bex]);
  rows.sum.push(["Savings Account A (current balance)",savingsBal("A")]);
  rows.sum.push(["Savings Account B (current balance)",savingsBal("B")]);
  rows.sum.push(["Months Covered",T.months]);
  rows.sum.push(["Range",from?from+" to "+to:MONTHS[+keys[0].split("-")[1]-1]+" "+keys[0].split("-")[0]+" to "+MONTHS[+keys[keys.length-1].split("-")[1]-1]+" "+keys[keys.length-1].split("-")[0]]);
  rows.sum.push(["Generated",new Date().toISOString().slice(0,10)]);
  for(const acc of ["A","B"]) for(const t of S.savings[acc].tx) if(savIn(t)) rows.sav.push([t.date,S.savings[acc].name,t.kind==="deposit"?"Deposit":"Withdraw",t.amount,t.notes||""]);
  for(const sb of S.subs) rows.subs.push([sb.name,sb.amount||0,sb.renewal||"",sb.active?"Yes":"No",sb.trial?"Yes":"No",sb.trialStart||"",sb.trialEnd||""]);
  const sheets=[["Dashboard Summary",rows.sum],["Transactions",rows.tx],["Income",rows.inc],["Personal Expenses",rows.exp],
    ["Business Income",rows.bizIn],["Business Expenses",rows.bizEx],["Savings",rows.sav],["Bills",rows.bills],["Subscriptions",rows.subs],["Categories",rows.cats]];
  dl(buildXlsx(sheets),"finance-tracker-"+(from?from+"_"+to:keys[0]+"_"+keys[keys.length-1])+".xlsx");
  toast("Export downloaded");
}
function xesc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function dl(blob,name){ const a=document.createElement("a"); a.href=URL.createObjectURL(blob); a.download=name; a.click(); setTimeout(()=>URL.revokeObjectURL(a.href),4000); }

/* ---------- modal / toast helpers ---------- */
function showModal(html){
  document.getElementById("modalRoot").innerHTML=`<div class="overlay" onclick="if(event.target===this)closeModal()"><div class="modal">${html}</div></div>`;
  const a=document.querySelector(".modal [autofocus]"); if(a) setTimeout(()=>a.focus(),80);
}
function closeModal(){ document.getElementById("modalRoot").innerHTML=""; }
let toastT;
function toast(msg){
  clearTimeout(toastT);
  document.getElementById("toastRoot").innerHTML=`<div class="toast">${msg}</div>`;
  toastT=setTimeout(()=>document.getElementById("toastRoot").innerHTML="",2200);
}
function esc(s){ return String(s??"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
document.addEventListener("keydown",e=>{ if(e.key==="Escape") closeModal(); });

render();

if("serviceWorker" in navigator){
  window.addEventListener("load",()=>{
    navigator.serviceWorker.register("sw.js").catch(e=>console.warn("SW registration failed",e));
  });
}
</script>
